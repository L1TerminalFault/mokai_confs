[project]
name = "volk"
git_repo = "zeux/volk"

[recipes]
"latest" = """
[project]
name = "volk"
version = "1.3.354"
license = "MIT"
description = "Meta-loader for Vulkan API"
homepage = "https://github.com/zeux/volk"
cpp_version = "c++17"

[options]
VOLK_NAMESPACE = false
VOLK_ENABLE_X11 = true
VOLK_ENABLE_WAYLAND = true
VOLK_ENABLE_WIN32 = true
VOLK_ENABLE_COCOA = true

[target.volk]
type = "static_library"
sources = ["volk.c"]
include_dirs = ["."]

# --- Global Unix Link Requirements (dl) ---
[[target.volk.system_libs_if]]
condition = "os != windows"
libs = ["dl"]

# --- C++ Namespace Feature ---
[[target.volk.properties_if]]
condition = "options.VOLK_NAMESPACE == true"
defines = ["VOLK_NAMESPACE"]

# --- Windows platform flags ---
[[target.volk.properties_if]]
condition = "os == windows && options.VOLK_ENABLE_WIN32"
defines = ["VK_USE_PLATFORM_WIN32_KHR"]

# --- Linux X11 platform flags ---
[[target.volk.properties_if]]
condition = "os == linux && options.VOLK_ENABLE_X11"
defines = ["VK_USE_PLATFORM_XLIB_KHR", "VK_USE_PLATFORM_XCB_KHR"]

# --- Linux Wayland platform flags ---
[[target.volk.properties_if]]
condition = "os == linux && options.VOLK_ENABLE_WAYLAND"
defines = ["VK_USE_PLATFORM_WAYLAND_KHR"]

# --- macOS Cocoa/Metal platform flags ---
[[target.volk.properties_if]]
condition = "os == macos && options.VOLK_ENABLE_COCOA"
defines = ["VK_USE_PLATFORM_METAL_EXT", "VK_USE_PLATFORM_MACOS_MVK"]

[exports]
default_targets = ["volk"]
include_dirs = ["."]
"""
